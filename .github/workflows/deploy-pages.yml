name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static dashboard
        env:
          VITE_STATIC_DATA: 'true'
          VITE_GITHUB_REPO: ${{ github.repository }}
        run: |
          npx vite build --base "/${{ github.event.repository.name }}/" --outDir dist/static
          mkdir -p dist/static/data
          cp data/*.json dist/static/data/ 2>/dev/null || echo '[]' | tee dist/static/data/profiles.json dist/static/data/shots.json > /dev/null

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/static

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
